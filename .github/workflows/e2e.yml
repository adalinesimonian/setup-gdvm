name: End-to-end tests

on:
  workflow_call:
    inputs:
      ref:
        description: "The ref to check out and test the action from"
        type: string
        required: false
        default: ""

permissions:
  contents: read

jobs:
  e2e:
    name: End-to-end tests (${{ matrix.os }}${{ matrix.architecture && format(' {0}', matrix.architecture) }}, gdvm ${{ matrix.version }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
          - macos-15-intel
          - windows-latest
          - windows-11-arm
        version: [latest, 0.15.0]
        include:
          - os: ubuntu-latest
            version: latest
            architecture: i686
          - os: ubuntu-latest
            version: 0.15.0
            architecture: i686
          - os: windows-latest
            version: latest
            architecture: i686
          - os: windows-latest
            version: 0.15.0
            architecture: i686
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}

      - name: Set up gdvm
        id: setup
        uses: ./
        with:
          version: ${{ matrix.version }}
          architecture: ${{ matrix.architecture }}

      - name: gdvm is on PATH and reports its version
        shell: bash
        run: |
          set -euo pipefail
          gdvm --version
          test -n "${{ steps.setup.outputs.gdvm-version }}"

      - name: The godot shim exists
        shell: bash
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "Windows" ]; then
            test -f "$HOME/.gdvm/bin/godot.exe"
          else
            test -x "$HOME/.gdvm/bin/godot"
          fi

      - name: A second setup hits the tool cache
        id: second
        uses: ./
        with:
          version: ${{ matrix.version }}
          architecture: ${{ matrix.architecture }}

      - name: The cache was hit
        shell: bash
        run: test "${{ steps.second.outputs.cache-hit }}" = "true"

  e2e-rejects-unsupported:
    name: Rejects unsupported versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}

      - name: Requesting 0.14.0 must fail
        id: old
        continue-on-error: true
        uses: ./
        with:
          version: 0.14.0

      - name: The failure happened
        run: test "${{ steps.old.outcome }}" = "failure"
