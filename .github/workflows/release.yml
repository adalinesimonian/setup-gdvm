name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, e.g. v1.2.3"
        required: true
        type: string
      prerelease:
        description: "Mark as a pre-release"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.release_tag }}
      - run: corepack enable
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: latest
          cache: yarn
      - run: yarn --immutable
      - run: yarn format:check
      - run: yarn lint
        if: success() || failure()
      - run: yarn typecheck
        if: success() || failure()
      - run: yarn test
        if: success() || failure()

  e2e:
    uses: ./.github/workflows/e2e.yml
    with:
      ref: ${{ inputs.release_tag }}

  release:
    needs: [test, e2e]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - name: Validate the tag name
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "release_tag must be vX.Y.Z, got: $RELEASE_TAG" >&2
            exit 1
          }

      - name: Move the floating major tag
        if: ${{ !inputs.prerelease }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          sha=$(gh api "repos/$GITHUB_REPOSITORY/commits/$RELEASE_TAG" --jq .sha)
          major="${RELEASE_TAG%%.*}"

          gh api "repos/$GITHUB_REPOSITORY/git/refs/tags/$major" \
            --method PATCH \
            -f "sha=$sha" \
            -F "force=true" \
            || gh api "repos/$GITHUB_REPOSITORY/git/refs" \
              -f "ref=refs/tags/$major" \
              -f "sha=$sha"

      - name: Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_tag }}
          generate_release_notes: true
          prerelease: ${{ inputs.prerelease }}
