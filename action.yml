name: Setup gdvm
description: Install gdvm, the Godot version manager.
author: Adaline Simonian
branding:
  icon: download
  color: purple

inputs:
  version:
    description: The gdvm version to install. Defaults to "latest".
    required: false
    default: latest
  architecture:
    description: >-
      The target architecture to install gdvm for, e.g. "i686", "x86_64", or
      "aarch64". Useful to run, for example, 32-bit gdvm on a 64-bit runner.
      Defaults to the runner's architecture.
    required: false
    default: ""
  releases-url:
    description: >-
      Advanced. Override the gdvm releases manifest URL, e.g. for a mirror
      or in tests. Defaults to the official gdvm registry.
    required: false
    default: ""

outputs:
  gdvm-version:
    description: The exact gdvm version that was installed.
  gdvm-path:
    description: The absolute path to the installed gdvm binary.
  cache-hit:
    description: Whether the binary came from the runner tool cache.

runs:
  using: node24
  main: src/main.ts
